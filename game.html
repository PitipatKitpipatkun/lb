<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🎮 เกมทายคำถามสัตวแพทย์</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&family=Prompt:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --teal:#0d9488;--teal-d:#0f766e;--teal-l:#ccfbf1;--teal-50:#f0fdfa;
  --rose:#e11d48;--rose-l:#ffe4e6;
  --slate:#1e293b;--slate-m:#475569;--slate-l:#94a3b8;
  --border:#e2e8f0;--bg:#f8fafc;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:'Sarabun',sans-serif;background:var(--bg);color:var(--slate);min-height:100vh;}

/* Header */
.header{background:linear-gradient(135deg,var(--teal),var(--teal-d));color:white;padding:14px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:50;box-shadow:0 2px 12px rgba(13,148,136,0.3);}
.header-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,0.2);border:none;color:white;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.header-title{font-family:'Prompt',sans-serif;font-size:17px;font-weight:700;flex:1;}
.header-sub{font-size:11px;opacity:0.8;margin-top:1px;}

/* Main area */
.main{padding:16px;max-width:520px;margin:0 auto;padding-bottom:calc(80px + var(--safe-b));}

/* Home screen */
.home-hero{background:white;border-radius:20px;border:1px solid var(--border);overflow:hidden;margin-bottom:16px;}
.hero-top{background:linear-gradient(135deg,var(--teal-50),#e0fdf4);padding:24px;text-align:center;}
.hero-emoji{font-size:64px;margin-bottom:8px;}
.hero-title{font-family:'Prompt',sans-serif;font-size:20px;font-weight:800;color:var(--teal-d);margin-bottom:4px;}
.hero-sub{font-size:13px;color:var(--slate-m);}
.hero-body{padding:16px;}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat-box{background:var(--bg);border-radius:12px;padding:12px 8px;text-align:center;}
.stat-num{font-family:'Prompt',sans-serif;font-size:20px;font-weight:800;color:var(--teal);}
.stat-lbl{font-size:10px;color:var(--slate-l);font-weight:700;text-transform:uppercase;margin-top:2px;}
.btn-start{width:100%;padding:14px;background:linear-gradient(135deg,var(--teal),var(--teal-d));color:white;border:none;border-radius:14px;font-family:'Sarabun',sans-serif;font-size:16px;font-weight:700;cursor:pointer;box-shadow:0 4px 16px rgba(13,148,136,0.35);transition:all 0.2s;}
.btn-start:active{transform:scale(0.97);}
.btn-outline{width:100%;padding:12px;background:white;color:var(--teal);border:2px solid var(--teal);border-radius:14px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;transition:all 0.2s;}

/* Category grid */
.cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
.cat-btn{padding:12px 10px;border-radius:12px;border:1.5px solid var(--border);background:white;font-family:'Sarabun',sans-serif;font-size:12px;font-weight:600;cursor:pointer;text-align:left;line-height:1.4;transition:all 0.15s;}
.cat-btn:hover{border-color:var(--teal);background:var(--teal-50);}
.cat-btn .cat-count{font-size:10px;color:var(--slate-l);font-weight:400;}

/* Quiz card */
.quiz-card{background:white;border-radius:18px;border:1px solid var(--border);overflow:hidden;}
.quiz-header{padding:12px 16px;display:flex;align-items:center;justify-content:space-between;}
.quiz-animal{font-size:32px;}
.quiz-meta{text-align:right;}
.quiz-q-num{font-size:11px;color:var(--slate-l);}
.quiz-score{font-family:'Prompt',sans-serif;font-size:20px;font-weight:800;color:var(--teal);}
.progress-bar{height:5px;background:var(--bg);}
.progress-fill{height:5px;background:linear-gradient(90deg,var(--teal),var(--teal-d));transition:width 0.4s cubic-bezier(0.4,0,0.2,1);}
.streak-bar{padding:6px 16px;background:#fff7ed;font-size:12px;font-weight:700;color:#c2410c;text-align:center;display:none;}
.quiz-body{padding:16px 16px 20px;}
.cat-tag{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:3px 10px;border-radius:100px;margin-bottom:10px;}
.lv-badge{font-size:10px;padding:2px 8px;border-radius:100px;font-weight:700;margin-left:6px;}
.lv-easy{background:#dcfce7;color:#166534;}
.lv-medium{background:#fef9c3;color:#92400e;}
.lv-hard{background:#fee2e2;color:#991b1b;}
.question-text{font-size:15px;font-weight:600;line-height:1.65;margin-bottom:18px;color:var(--slate);}
.choices{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.choice-btn{padding:11px 12px;border:1.5px solid var(--border);border-radius:12px;background:white;color:var(--slate);font-family:'Sarabun',sans-serif;font-size:13px;text-align:center;cursor:pointer;line-height:1.4;transition:all 0.15s;-webkit-tap-highlight-color:transparent;}
.choice-btn:active{transform:scale(0.97);}
.choice-btn.correct{background:#dcfce7;border-color:#16a34a;color:#166534;font-weight:700;}
.choice-btn.wrong{background:#fee2e2;border-color:#dc2626;color:#991b1b;font-weight:700;}
.choice-btn:disabled{cursor:default;}
.feedback-msg{text-align:center;font-size:13px;font-weight:700;padding:10px;margin-top:10px;border-radius:10px;}
.feedback-ok{background:#dcfce7;color:#166534;}
.feedback-ng{background:#fee2e2;color:#991b1b;}

/* Result screen */
.result-card{background:white;border-radius:20px;border:1px solid var(--border);padding:28px;text-align:center;}
.result-emoji{font-size:72px;margin-bottom:12px;}
.result-score{font-family:'Prompt',sans-serif;font-size:28px;font-weight:800;margin-bottom:4px;}
.result-msg{font-size:14px;color:var(--slate-m);margin-bottom:20px;line-height:1.6;}
.result-breakdown{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;}
.rb-box{background:var(--bg);border-radius:10px;padding:10px 6px;text-align:center;}
.rb-num{font-family:'Prompt',sans-serif;font-size:18px;font-weight:800;}
.rb-lbl{font-size:10px;color:var(--slate-l);font-weight:700;text-transform:uppercase;margin-top:2px;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;}
.btn-primary{flex:1;padding:12px;background:linear-gradient(135deg,var(--teal),var(--teal-d));color:white;border:none;border-radius:12px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}
.btn-secondary{flex:1;padding:12px;background:white;color:var(--teal);border:2px solid var(--teal);border-radius:12px;font-family:'Sarabun',sans-serif;font-size:14px;font-weight:700;cursor:pointer;}

/* Screens */
.screen{display:none;}
.screen.active{display:block;}
</style>
</head>
<body>

<div class="header">
  <button class="header-back" onclick="goBack()">←</button>
  <div>
    <div class="header-title">🎮 เกมทายคำถามสัตวแพทย์</div>
    <div class="header-sub" id="hdrSub">คณะสัตวแพทยศาสตร์ มทร.ตะวันออก</div>
  </div>
</div>

<div class="main">

  <!-- HOME -->
  <div id="screen-home" class="screen active">
    <div class="home-hero">
      <div class="hero-top">
        <div class="hero-emoji">🐾</div>
        <div class="hero-title">VetQuiz</div>
        <div class="hero-sub">ทดสอบความรู้สัตวแพทย์ <span id="totalQ">0</span> คำถาม</div>
      </div>
      <div class="hero-body">
        <div class="stat-grid">
          <div class="stat-box"><div class="stat-num" id="statBest">—</div><div class="stat-lbl">สถิติสูงสุด</div></div>
          <div class="stat-box"><div class="stat-num" id="statGames">0</div><div class="stat-lbl">เล่นไปแล้ว</div></div>
          <div class="stat-box"><div class="stat-num" id="statStreak">0</div><div class="stat-lbl">Streak สูงสุด</div></div>
        </div>
        <button class="btn-start" onclick="startGame()">🎲 เล่นสุ่มทุกหมวด</button>
        <button class="btn-outline" onclick="showCats()">📚 เลือกหมวดหมู่</button>
      </div>
    </div>
  </div>

  <!-- CATEGORY -->
  <div id="screen-cat" class="screen">
    <div style="font-size:14px;font-weight:700;margin-bottom:12px;color:var(--slate-m);">📚 เลือกหมวดหมู่</div>
    <div class="cat-grid" id="catGrid"></div>
    <button class="btn-outline" onclick="showScreen('home')" style="margin-top:4px;">← กลับ</button>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="screen">
    <div class="quiz-card">
      <div class="quiz-header">
        <div class="quiz-animal" id="qAnimal">🐾</div>
        <div class="quiz-meta">
          <div class="quiz-q-num">ข้อ <span id="qNum">1</span>/10</div>
          <div class="quiz-score" id="qScore">0</div>
        </div>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="qProg" style="width:0%"></div></div>
      <div class="streak-bar" id="streakBar">🔥 Streak!</div>
      <div class="quiz-body">
        <div>
          <span class="cat-tag" id="qCatTag"></span>
          <span class="lv-badge" id="qLvBadge"></span>
        </div>
        <div class="question-text" id="qText"></div>
        <div class="choices" id="qChoices"></div>
        <div class="feedback-msg" id="qFeedback" style="display:none;"></div>
      </div>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="screen">
    <div class="result-card">
      <div class="result-emoji" id="rEmoji">🏆</div>
      <div class="result-score" id="rScore">0 คะแนน</div>
      <div class="result-msg" id="rMsg"></div>
      <div class="result-breakdown">
        <div class="rb-box"><div class="rb-num" id="rCorrect" style="color:#16a34a;">0</div><div class="rb-lbl">✅ ถูก</div></div>
        <div class="rb-box"><div class="rb-num" id="rWrong" style="color:#dc2626;">0</div><div class="rb-lbl">❌ ผิด</div></div>
        <div class="rb-box"><div class="rb-num" id="rStreakMax" style="color:#d97706;">0</div><div class="rb-lbl">🔥 Streak</div></div>
      </div>
      <div class="btn-row">
        <button class="btn-primary" onclick="replayGame()">🔄 เล่นอีกรอบ</button>
        <button class="btn-secondary" onclick="showScreen('home')">🏠 หน้าหลัก</button>
      </div>
    </div>
  </div>

</div>


<script>
const VET_QUESTIONS = [
  {"q": "กระดูกสันหลังส่วน Cervical ของสุนัขมีกี่ชิ้น?", "a": "7", "w": ["5", "9", "12"], "animal": "🦴", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Carpus ของสุนัขอยู่บริเวณใด?", "a": "ข้อมือ ขาหน้า", "w": ["ข้อเท้า", "เข่า", "สะโพก"], "animal": "🐕", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Tarsus ของสุนัขอยู่บริเวณใด?", "a": "ข้อเท้า ขาหลัง", "w": ["ข้อมือ", "เข่า", "สะโพก"], "animal": "🐕", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "ลิ้นหัวใจใดคั่นระหว่าง Left ventricle กับ Aorta?", "a": "Aortic valve", "w": ["Mitral valve", "Tricuspid valve", "Pulmonary valve"], "animal": "❤️", "lv": "medium", "cat": "กายวิภาค"},
  {"q": "Rumen คือส่วนใดของกระเพาะวัว?", "a": "กระเพาะส่วนแรก ผ้าขี้ริ้ว", "w": ["ส่วนสอง", "ส่วนสาม", "ส่วนสี่"], "animal": "🐄", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Abomasum ของวัวเปรียบได้กับสิ่งใดในสุนัข?", "a": "กระเพาะแท้ True stomach", "w": ["Rumen", "Reticulum", "Omasum"], "animal": "🐄", "lv": "medium", "cat": "กายวิภาค"},
  {"q": "หัวใจห้องใดมีผนังหนาที่สุด?", "a": "Left ventricle", "w": ["Right ventricle", "Left atrium", "Right atrium"], "animal": "❤️", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Patella คือกระดูกส่วนใด?", "a": "ลูกสะบ้าเข่า", "w": ["ข้อมือ", "ข้อศอก", "ข้อเท้า"], "animal": "🦵", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Alveoli คืออะไร?", "a": "ถุงลมขนาดเล็กในปอดสำหรับแลกเปลี่ยนก๊าซ", "w": ["หลอดลมใหญ่", "หลอดลมเล็ก", "เยื่อหุ้มปอด"], "animal": "🫁", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Gallbladder อยู่ติดกับอวัยวะใด?", "a": "ตับ", "w": ["ม้าม", "ไต", "ตับอ่อน"], "animal": "🫘", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Femur คือกระดูกส่วนใด?", "a": "กระดูกต้นขา", "w": ["กระดูกแข้ง", "กระดูกสะโพก", "กระดูกน่อง"], "animal": "🦵", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Jugular vein อยู่บริเวณใด?", "a": "คอ", "w": ["ขาหน้า", "ขาหลัง", "หาง"], "animal": "🐕", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Spleen ทำหน้าที่อะไร?", "a": "กรองเลือด กำจัด RBC เก่า", "w": ["สร้างน้ำดี", "ย่อยโปรตีน", "ผลิตปัสสาวะ"], "animal": "🫘", "lv": "medium", "cat": "กายวิภาค"},
  {"q": "Cornea อยู่ส่วนใดของดวงตา?", "a": "ชั้นหน้าสุดของตา", "w": ["ด้านหลัง", "ด้านข้าง", "ตรงกลาง"], "animal": "👁️", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Lens ในดวงตาทำหน้าที่อะไร?", "a": "โฟกัสแสงไปที่ Retina", "w": ["รับแสง", "ส่งสัญญาณประสาท", "ผลิตน้ำตา"], "animal": "👁️", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Adrenal gland อยู่ติดกับอวัยวะใด?", "a": "ไต", "w": ["ตับ", "ม้าม", "ปอด"], "animal": "🧬", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Pituitary gland อยู่บริเวณใด?", "a": "ฐานสมอง", "w": ["คอ", "ท้อง", "หน้าอก"], "animal": "🧠", "lv": "medium", "cat": "กายวิภาค"},
  {"q": "สุนัขมี Thoracic vertebrae กี่ชิ้น?", "a": "13", "w": ["7", "10", "17"], "animal": "🐕", "lv": "medium", "cat": "กายวิภาค"},
  {"q": "สุนัขมี Lumbar vertebrae กี่ชิ้น?", "a": "7", "w": ["3", "5", "9"], "animal": "🐕", "lv": "medium", "cat": "กายวิภาค"},
  {"q": "Radius อยู่ส่วนใด?", "a": "ขาหน้าส่วนล่าง", "w": ["ขาหลัง", "คอ", "ซี่โครง"], "animal": "🦴", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Gallbladder ทำหน้าที่อะไร?", "a": "เก็บและทำให้ Bile เข้มข้น", "w": ["สร้าง Bile", "ย่อยอาหาร", "กรองเลือด"], "animal": "🫘", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Jejunum อยู่ส่วนใดของลำไส้?", "a": "ลำไส้เล็กส่วนกลาง", "w": ["ส่วนต้น Duodenum", "ส่วนปลาย Ileum", "ลำไส้ใหญ่"], "animal": "🌀", "lv": "medium", "cat": "กายวิภาค"},
  {"q": "Duodenum เชื่อมกับอวัยวะใดโดยตรง?", "a": "กระเพาะอาหาร", "w": ["ลำไส้ใหญ่", "ตับ", "ม้าม"], "animal": "🌀", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Meninges ประกอบด้วยกี่ชั้น?", "a": "3 ชั้น", "w": ["1", "2", "5"], "animal": "🧠", "lv": "medium", "cat": "กายวิภาค"},
  {"q": "Vitreous humor อยู่ที่ใดของดวงตา?", "a": "ด้านหลังของเลนส์", "w": ["ด้านหน้า", "บน Cornea", "บน Retina"], "animal": "👁️", "lv": "medium", "cat": "กายวิภาค"},
  {"q": "Lymph node มีหน้าที่หลักด้านใด?", "a": "กรองน้ำเหลืองและสร้าง Lymphocyte", "w": ["สร้างเลือด", "ย่อยอาหาร", "กรองปัสสาวะ"], "animal": "🫘", "lv": "medium", "cat": "กายวิภาค"},
  {"q": "หลอดเลือด Portal vein นำเลือดจากที่ใดไปที่ใด?", "a": "ลำไส้ไปสู่ตับ", "w": ["ตับไปหัวใจ", "หัวใจไปปอด", "ไตไปกระเพาะ"], "animal": "🫀", "lv": "hard", "cat": "กายวิภาค"},
  {"q": "Corpus luteum สร้างจากอะไร?", "a": "Follicle ที่แตกออกหลัง Ovulation", "w": ["Uterus", "Placenta", "Adrenal gland"], "animal": "🥚", "lv": "hard", "cat": "กายวิภาค"},
  {"q": "Intervertebral disc อยู่ระหว่างอะไร?", "a": "กระดูกสันหลัง 2 ชิ้น", "w": ["กระดูกซี่โครง", "กระดูกเชิงกราน", "กะโหลก"], "animal": "🦴", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "กล้ามเนื้อ Diaphragm ทำหน้าที่ใด?", "a": "ช่วยในการหายใจ", "w": ["ย่อยอาหาร", "สูบฉีดเลือด", "ผลิตฮอร์โมน"], "animal": "🫁", "lv": "easy", "cat": "กายวิภาค"},
  {"q": "Sacrum ของสุนัขรวมมาจากกระดูกกี่ชิ้น?", "a": "3", "w": ["1", "5", "7"], "animal": "🦴", "lv": "hard", "cat": "กายวิภาค"},
  {"q": "Estrus cycle ของแมวมีลักษณะพิเศษอย่างไร?", "a": "เป็น Induced ovulator", "w": ["Spontaneous ovulator", "ไม่มี Estrus", "ฤดูหนาวเท่านั้น"], "animal": "🐈", "lv": "hard", "cat": "กายวิภาค"},
  {"q": "เส้นประสาท Sciatic nerve ออกจากส่วนใด?", "a": "Lumbar-Sacral plexus", "w": ["Brachial plexus", "Cervical plexus", "Trigeminal"], "animal": "🧠", "lv": "hard", "cat": "กายวิภาค"},

  {"q": "Herpetology คือการศึกษาเกี่ยวกับ?", "a": "สัตว์เลื้อยคลานและสัตว์สะเทินน้ำสะเทินบก", "w": ["สัตว์ปีก", "สัตว์เลี้ยงลูกด้วยนม", "แมลง"], "animal": "🐍", "lv": "easy", "cat": "Exotic"},
  {"q": "Parrots สามารถเลียนแบบเสียงพูดได้เพราะ?", "a": "มีความสามารถพิเศษของ Syrinx และสมอง", "w": ["มีเสียงดัง", "มีปากใหญ่", "มีลิ้นยาว"], "animal": "🦜", "lv": "easy", "cat": "Exotic"},
  {"q": "Zoonotic disease จาก Psittacine birds ที่สำคัญคือ?", "a": "Psittacosis", "w": ["Rabies", "Ringworm", "Leptospirosis"], "animal": "🦜", "lv": "medium", "cat": "Exotic"},
  {"q": "อุณหภูมิสำหรับฟักไข่ไก่ที่เหมาะสม?", "a": "37.5–37.8 °C", "w": ["35.0", "40.0", "42.0"], "animal": "🐔", "lv": "medium", "cat": "Exotic"},
  {"q": "Myiasis หมายถึง?", "a": "การติดเชื้อแมลงวันในเนื้อเยื่อ", "w": ["พยาธิตัวกลม", "ไรในขน", "เห็บ"], "animal": "🪲", "lv": "easy", "cat": "Exotic"},
  {"q": "Koi Herpesvirus ทำให้เกิดปัญหากับสัตว์ชนิดใด?", "a": "ปลา Koi", "w": ["นก", "งู", "กระต่าย"], "animal": "🐟", "lv": "medium", "cat": "Exotic"},
];

// ===== Game State =====
let gQ=[], gScore=0, gIdx=0, gStreak=0, gStreakMax=0, gCorrect=0, gChosen=false, gLastCat='all';

const CAT_COLORS = {
  'กายวิภาค':'#dbeafe','สรีรวิทยา':'#d1fae5','เภสัชวิทยา':'#ede9fe',
  'จุลชีววิทยา':'#fef9c3','ปรสิตวิทยา':'#fce7f3','พยาธิวิทยา':'#fee2e2',
  'อายุรกรรม':'#e0f2fe','ศัลยกรรม':'#fef3c7','สัตว์ใหญ่':'#dcfce7','Exotic':'#f0fdf4'
};
const CAT_EMOJI = {
  'กายวิภาค':'🦴','สรีรวิทยา':'💓','เภสัชวิทยา':'💊','จุลชีววิทยา':'🦠',
  'ปรสิตวิทยา':'🐛','พยาธิวิทยา':'🔬','อายุรกรรม':'🩺','ศัลยกรรม':'✂️',
  'สัตว์ใหญ่':'🐄','Exotic':'🦜'
};

// ===== Init =====
function init(){
  const qs = typeof VET_QUESTIONS !== 'undefined' ? VET_QUESTIONS : [];
  document.getElementById('totalQ').textContent = qs.length;
  // Load stats
  const stats = JSON.parse(localStorage.getItem('vetquiz_stats')||'{}');
  document.getElementById('statBest').textContent = stats.best||'—';
  document.getElementById('statGames').textContent = stats.games||0;
  document.getElementById('statStreak').textContent = stats.streak||0;
}

// ===== Screens =====
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+name).classList.add('active');
}
function goBack(){
  const cur = document.querySelector('.screen.active').id;
  if(cur==='screen-home') window.location.href='student-dashboard.html';
  else if(cur==='screen-quiz') { if(confirm('ออกจากเกม?')) showScreen('home'); }
  else showScreen('home');
}

// ===== Category screen =====
function showCats(){
  const qs = typeof VET_QUESTIONS !== 'undefined' ? VET_QUESTIONS : [];
  const cats = {};
  qs.forEach(q=>{ cats[q.cat]=(cats[q.cat]||0)+1; });
  const grid = document.getElementById('catGrid');
  grid.innerHTML = Object.entries(cats).sort().map(([cat,n])=>`
    <button class="cat-btn" onclick="startGame('${cat}')" style="background:${CAT_COLORS[cat]||'#f1f5f9'};">
      <span style="font-size:20px;">${CAT_EMOJI[cat]||'📚'}</span><br>
      ${cat}<br><span class="cat-count">${n} ข้อ</span>
    </button>`).join('');
  showScreen('cat');
}

// ===== Start / Replay =====
function startGame(cat){
  const qs = typeof VET_QUESTIONS !== 'undefined' ? VET_QUESTIONS : [];
  const pool = cat && cat!=='all' ? qs.filter(q=>q.cat===cat) : qs;
  gLastCat = cat||'all';
  gQ = [...pool].sort(()=>Math.random()-0.5).slice(0, Math.min(10, pool.length));
  gScore=0; gIdx=0; gStreak=0; gStreakMax=0; gCorrect=0; gChosen=false;
  document.getElementById('hdrSub').textContent = cat&&cat!=='all'?'หมวด: '+cat:'สุ่มทุกหมวด — 10 ข้อ';
  showScreen('quiz');
  renderQ();
}
function replayGame(){ startGame(gLastCat==='all'?undefined:gLastCat); }

// ===== Render question =====
function shuffle(a){ return a.sort(()=>Math.random()-0.5); }
function renderQ(){
  if(gIdx>=gQ.length){ endGame(); return; }
  gChosen = false;
  const q = gQ[gIdx];
  document.getElementById('qAnimal').textContent = q.animal;
  document.getElementById('qNum').textContent = gIdx+1;
  document.getElementById('qScore').textContent = gScore;
  document.getElementById('qProg').style.width = (gIdx/gQ.length*100)+'%';
  // Streak bar
  const sb = document.getElementById('streakBar');
  if(gStreak>=3){ sb.textContent='🔥 Streak '+gStreak+' ต่อเนื่อง! +1 bonus'; sb.style.display='block'; }
  else sb.style.display='none';
  // Category + level
  const catCol = CAT_COLORS[q.cat]||'#f1f5f9';
  const catTag = document.getElementById('qCatTag');
  catTag.textContent = (CAT_EMOJI[q.cat]||'📚')+' '+q.cat;
  catTag.style.background = catCol;
  catTag.style.color = '#1e293b';
  const lvMap = {easy:'lv-easy',medium:'lv-medium',hard:'lv-hard'};
  const lvTxt = {easy:'ง่าย',medium:'กลาง',hard:'ยาก'};
  const lvBadge = document.getElementById('qLvBadge');
  lvBadge.textContent = lvTxt[q.lv]||q.lv;
  lvBadge.className = 'lv-badge '+(lvMap[q.lv]||'lv-easy');
  // Question text
  document.getElementById('qText').textContent = q.q;
  // Feedback hidden
  const fb = document.getElementById('qFeedback');
  fb.style.display='none'; fb.className='feedback-msg';
  // Choices
  const opts = shuffle([q.a,...q.w]);
  document.getElementById('qChoices').innerHTML = opts.map((o,i)=>
    `<button class="choice-btn" id="cb${i}" onclick="pick(${i},'${o.replace(/'/g,"\'")}','${q.a.replace(/'/g,"\'")}',${q.lv==='hard'?3:q.lv==='medium'?2:1})">${o}</button>`
  ).join('');
}

// ===== Pick answer =====
function pick(idx, chosen, correct, pts){
  if(gChosen) return;
  gChosen = true;
  const btns = document.querySelectorAll('.choice-btn');
  btns.forEach(b=>b.disabled=true);
  const ok = chosen===correct;
  const fb = document.getElementById('qFeedback');
  // Highlight buttons
  btns.forEach(b=>{
    if(b.textContent===correct) b.classList.add('correct');
  });
  if(!ok){
    document.getElementById('cb'+idx).classList.add('wrong');
    gStreak=0;
    fb.textContent='❌ ผิด — คำตอบที่ถูกคือ: '+correct;
    fb.className='feedback-msg feedback-ng';
    fb.style.display='block';
  } else {
    const bonus = gStreak>=3?1:0;
    gScore += pts+bonus;
    gStreak++;
    gStreakMax = Math.max(gStreakMax,gStreak);
    gCorrect++;
    fb.textContent = bonus?'✅ ถูก! +'+pts+' (+1 Streak bonus)':'✅ ถูก! +'+pts;
    fb.className='feedback-msg feedback-ok';
    fb.style.display='block';
  }
  document.getElementById('qScore').textContent=gScore;
  setTimeout(()=>{ gIdx++; renderQ(); }, 1100);
}

// ===== End game =====
function endGame(){
  const maxScore = gQ.reduce((s,q)=>s+(q.lv==='hard'?3:q.lv==='medium'?2:1),0);
  const pct = maxScore>0?Math.round(gScore/maxScore*100):0;
  const icons = ['😓','🐾','🩺','⭐','🏆'];
  const msgs = ['ลองใหม่ได้นะ!','พอใช้ได้ ฝึกอีกนิด','ดีมาก! กำลังก้าวหน้า','เยี่ยมมาก! เกือบเต็ม','หมอสัตว์ตัวจริง!'];
  const ri = Math.min(4,Math.floor(pct/21));
  document.getElementById('rEmoji').textContent=icons[ri];
  document.getElementById('rScore').textContent=gScore+' คะแนน';
  document.getElementById('rMsg').innerHTML=msgs[ri]+'<br><small style="color:#94a3b8">'+pct+'% ของคะแนนเต็ม '+maxScore+' คะแนน</small>';
  document.getElementById('rCorrect').textContent=gCorrect;
  document.getElementById('rWrong').textContent=(gQ.length-gCorrect);
  document.getElementById('rStreakMax').textContent=gStreakMax;
  // Save stats
  const stats = JSON.parse(localStorage.getItem('vetquiz_stats')||'{}');
  stats.games=(stats.games||0)+1;
  stats.best=Math.max(stats.best||0,gScore);
  stats.streak=Math.max(stats.streak||0,gStreakMax);
  localStorage.setItem('vetquiz_stats',JSON.stringify(stats));
  showScreen('result');
}

init();
</script>
</body>
</html>
