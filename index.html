<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึก Log Book สำหรับนักศึกษา</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        /* ===== Main Menu Screen ===== */
        .screen {
            display: none;
            animation: slideIn 0.3s ease-in-out;
        }

        .screen.active {
            display: block;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== Main Menu ===== */
        .menu-screen {
            text-align: center;
        }

        .logo-section {
            background: white;
            padding: 40px 20px;
            border-radius: 20px 20px 0 0;
            margin-bottom: 10px;
        }

        .logo-icon {
            font-size: 60px;
            margin-bottom: 15px;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        .app-title {
            font-size: 24px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .app-subtitle {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .menu-buttons {
            background: white;
            padding: 30px 20px;
            border-radius: 0 0 20px 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .menu-btn {
            padding: 18px;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .menu-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.15);
        }

        .menu-btn:active {
            transform: translateY(-1px);
        }

        .btn-student {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-teacher {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-settings {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn-icon {
            font-size: 20px;
        }

        /* ===== Login Screen ===== */
        .login-screen {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .login-icon {
            font-size: 50px;
            margin-bottom: 15px;
        }

        .login-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .login-subtitle {
            font-size: 14px;
            color: #999;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-input:focus {
            outline: none;
            border-color: #667eea;
            background-color: #f8f9ff;
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 15px;
        }

        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .back-btn {
            width: 100%;
            padding: 12px;
            background: #f0f0f0;
            color: #333;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .back-btn:hover {
            background: #e0e0e0;
        }

        .student-login .login-icon {
            color: #667eea;
        }

        .student-login .login-title {
            color: #667eea;
        }

        .student-login .login-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .teacher-login .login-icon {
            color: #f5576c;
        }

        .teacher-login .login-title {
            color: #f5576c;
        }

        .teacher-login .login-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
        }

        /* ===== Settings Screen ===== */
        .settings-screen {
            background: white;
            border-radius: 20px;
            padding: 30px 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        .settings-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .settings-icon {
            font-size: 50px;
            color: #00d4ff;
            margin-bottom: 15px;
        }

        .settings-title {
            font-size: 22px;
            font-weight: bold;
            color: #333;
            margin-bottom: 5px;
        }

        .settings-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }

        .settings-item {
            padding: 15px;
            background: #f8f9fa;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .settings-item:hover {
            background: #e8eef5;
        }

        .settings-item-label {
            font-weight: 500;
            color: #333;
            font-size: 14px;
        }

        .toggle-switch {
            width: 50px;
            height: 28px;
            background: #ccc;
            border-radius: 14px;
            position: relative;
            cursor: pointer;
            transition: background 0.3s;
        }

        .toggle-switch.active {
            background: #667eea;
        }

        .toggle-slider {
            width: 24px;
            height: 24px;
            background: white;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: left 0.3s;
        }

        .toggle-switch.active .toggle-slider {
            left: 24px;
        }

        .version-info {
            text-align: center;
            padding: 15px;
            background: #f0f0f0;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 12px;
            color: #666;
        }

        /* ===== Responsive ===== */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .app-title {
                font-size: 20px;
            }

            .menu-btn {
                padding: 16px;
                font-size: 15px;
            }

            .login-screen,
            .settings-screen {
                padding: 20px;
            }

            .login-title,
            .settings-title {
                font-size: 18px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Main Menu Screen -->
        <div id="menuScreen" class="screen active menu-screen">
            <div class="logo-section">
                <div class="logo-icon">📚</div>
                <h1 class="app-title">บันทึก Log Book</h1>
                <p class="app-subtitle">สำหรับนักศึกษา</p>
            </div>

            <div class="menu-buttons">
                <button class="menu-btn btn-student" onclick="goToLogin('student')">
                    <span class="btn-icon">👨‍🎓</span>
                    <span>นักศึกษาเข้าระบบ</span>
                </button>
                <button class="menu-btn btn-teacher" onclick="goToLogin('teacher')">
                    <span class="btn-icon">👨‍🏫</span>
                    <span>อาจารย์เข้าระบบ</span>
                </button>
                <button class="menu-btn btn-settings" onclick="goToSettings()">
                    <span class="btn-icon">⚙️</span>
                    <span>ตั้งค่า</span>
                </button>
            </div>
        </div>

        <!-- Student Login Screen -->
        <div id="studentLoginScreen" class="screen login-screen student-login">
            <div class="login-header">
                <div class="login-icon">👨‍🎓</div>
                <h2 class="login-title">เข้าระบบนักศึกษา</h2>
                <p class="login-subtitle">กรุณากรอกข้อมูลของคุณ</p>
            </div>

            <form onsubmit="handleStudentLogin(event)">
                <div class="form-group">
                    <label class="form-label">รหัสนักศึกษา</label>
                    <input type="text" class="form-input" id="studentId" placeholder="เช่น 6310000001" required>
                </div>

                <div class="form-group">
                    <label class="form-label">รหัสผ่าน</label>
                    <input type="password" class="form-input" id="studentPassword" placeholder="กรุณากรอกรหัสผ่าน" required>
                </div>

                <button type="submit" class="login-btn">เข้าระบบ</button>
            </form>

            <button class="back-btn" onclick="goToMenu()">← กลับหน้าหลัก</button>
        </div>

        <!-- Teacher Login Screen -->
        <div id="teacherLoginScreen" class="screen login-screen teacher-login">
            <div class="login-header">
                <div class="login-icon">👨‍🏫</div>
                <h2 class="login-title">เข้าระบบอาจารย์</h2>
                <p class="login-subtitle">กรุณากรอกข้อมูลของคุณ</p>
            </div>

            <form onsubmit="handleTeacherLogin(event)">
                <div class="form-group">
                    <label class="form-label">รหัสประจำตัว</label>
                    <input type="text" class="form-input" id="teacherId" placeholder="เช่น T001" required>
                </div>

                <div class="form-group">
                    <label class="form-label">รหัสผ่าน</label>
                    <input type="password" class="form-input" id="teacherPassword" placeholder="กรุณากรอกรหัสผ่าน" required>
                </div>

                <button type="submit" class="login-btn">เข้าระบบ</button>
            </form>

            <button class="back-btn" onclick="goToMenu()">← กลับหน้าหลัก</button>
        </div>

        <!-- Settings Screen -->
        <div id="settingsScreen" class="screen settings-screen">
            <div class="settings-header">
                <div class="settings-icon">⚙️</div>
                <h2 class="settings-title">ตั้งค่า</h2>
            </div>

            <div class="version-info">
                <p>เวอร์ชั่น: 1.0.0</p>
                <p>พัฒนาขึ้นเพื่อการศึกษา</p>
            </div>

            <div class="settings-list">
                <div class="settings-item" onclick="toggleNotification()">
                    <span class="settings-item-label">🔔 การแจ้งเตือน</span>
                    <div class="toggle-switch" id="notificationToggle">
                        <div class="toggle-slider"></div>
                    </div>
                </div>

                <div class="settings-item" onclick="toggleDarkMode()">
                    <span class="settings-item-label">🌙 โหมดมืด</span>
                    <div class="toggle-switch" id="darkModeToggle">
                        <div class="toggle-slider"></div>
                    </div>
                </div>

                <div class="settings-item" onclick="changeLang()">
                    <span class="settings-item-label">🌐 ภาษา</span>
                    <span style="font-size: 12px; color: #999;">ไทย</span>
                </div>

                <div class="settings-item" onclick="showAbout()">
                    <span class="settings-item-label">ℹ️ เกี่ยวกับแอป</span>
                    <span style="font-size: 12px; color: #999;">ข้อมูล</span>
                </div>
            </div>

            <button class="back-btn" onclick="goToMenu()">← กลับหน้าหลัก</button>
        </div>
    </div>

    <script>
        // Navigation Functions
        function goToMenu() {
            showScreen('menuScreen');
        }

        function goToLogin(type) {
            if (type === 'student') {
                showScreen('studentLoginScreen');
            } else if (type === 'teacher') {
                showScreen('teacherLoginScreen');
            }
        }

        function goToSettings() {
            showScreen('settingsScreen');
        }

        function showScreen(screenId) {
            const screens = document.querySelectorAll('.screen');
            screens.forEach(screen => screen.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
        }

        // Login Handlers
        function handleStudentLogin(event) {
            event.preventDefault();
            const studentId = document.getElementById('studentId').value;
            const password = document.getElementById('studentPassword').value;
            
            if (studentId && password) {
                // ที่นี่สามารถส่งข้อมูลไปยังเซิร์ฟเวอร์
                alert(`เข้าระบบสำเร็จ: ${studentId}`);
                // เปลี่ยนหน้าไปยังแดชบอร์ดนักศึกษา
                document.getElementById('studentId').value = '';
                document.getElementById('studentPassword').value = '';
            }
        }

        function handleTeacherLogin(event) {
            event.preventDefault();
            const teacherId = document.getElementById('teacherId').value;
            const password = document.getElementById('teacherPassword').value;
            
            if (teacherId && password) {
                // ที่นี่สามารถส่งข้อมูลไปยังเซิร์ฟเวอร์
                alert(`เข้าระบบสำเร็จ: ${teacherId}`);
                // เปลี่ยนหน้าไปยังแดชบอร์ดอาจารย์
                document.getElementById('teacherId').value = '';
                document.getElementById('teacherPassword').value = '';
            }
        }

        // Settings Functions
        function toggleNotification() {
            const toggle = document.getElementById('notificationToggle');
            toggle.classList.toggle('active');
            const isActive = toggle.classList.contains('active');
            localStorage.setItem('notificationEnabled', isActive);
        }

        function toggleDarkMode() {
            const toggle = document.getElementById('darkModeToggle');
            toggle.classList.toggle('active');
            const isDarkMode = toggle.classList.contains('active');
            localStorage.setItem('darkModeEnabled', isDarkMode);
            // ที่นี่สามารถใช้ dark mode
            if (isDarkMode) {
                alert('โหมดมืดเปิดใช้งานแล้ว');
            } else {
                alert('โหมดมืดปิดใช้งานแล้ว');
            }
        }

        function changeLang() {
            alert('ภาษาปัจจุบัน: ไทย\nตัวเลือกอื่น ๆ สามารถเพิ่มได้ในอนาคต');
        }

        function showAbout() {
            alert('บันทึก Log Book สำหรับนักศึกษา\nเวอร์ชั่น: 1.0.0\nพัฒนาเพื่อช่วยในการบันทึกและการประเมินผล');
        }

        // Load settings on page load
        window.addEventListener('load', function() {
            const notificationEnabled = localStorage.getItem('notificationEnabled') === 'true';
            const darkModeEnabled = localStorage.getItem('darkModeEnabled') === 'true';

            if (notificationEnabled) {
                document.getElementById('notificationToggle').classList.add('active');
            }
            if (darkModeEnabled) {
                document.getElementById('darkModeToggle').classList.add('active');
            }
        });
    </script>
</body>
</html>
